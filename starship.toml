format = """
[вЦСвЦТвЦУ](#abb2bf)\
[ пМГ ](bg:#abb2bf fg:#090c0c)\
[оВі](bg:#7aa2f7 fg:#abb2bf)\
$directory\
[оВі](fg:#7aa2f7 bg:#414868)\
$git_branch\
$git_status\
[оВі](fg:#414868 bg:#283457)\
$nodejs\
$python\
$lua\
[оВі](fg:#283457 bg:#292e42)\
$cmd_duration\
[оВі ](fg:#292e42)\
\n$character"""

[directory]
style = "fg:#15161e bg:#7aa2f7"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вА¶/"

[git_branch]
symbol = "пРШ"
style = "bg:#414868"
format = '[[ $symbol $branch ](fg:#8db0ff bg:#414868)]($style)'

[git_status]
style = "bg:#414868"
ahead = '[ пЕИ($count)](fg:green bg:#414868)'
untracked = '[ пД®($count)](fg:red bg:#414868)'
modified = '[ пБД ($count)](fg:yellow bg:#414868)'
deleted = '[ пАН ($count)](fg:red bg:#414868)'
format = '[[$all_status$ahead_behind](bg:#414868)]($style)'

[nodejs]
symbol = "оШМ "
style = "bg:#283457"
format = '[[ $symbol ($version) ](fg:#9ece6a bg:#283457)]($style)'

[python]
symbol = "оЬЉ "
style = "bg:#283457"
format = '[[ $symbol ($version) ](fg:#9ece6a bg:#283457)]($style)'

[lua]
symbol = "оШ† "
style = "bg:#283457"
format = '[[ $symbol ($version) ](fg:#9ece6a bg:#283457)]($style)'

[cmd_duration]
disabled = false
style = "bg:#292e42"
format = '[[ пРЇ $duration ](fg:#bb9af7 bg:#292e42)]($style)'

[character]
disabled = false
success_symbol = '[вЃЮ ](bold fg:#9ece6a)'
error_symbol = '[вЃЮ ](bold fg:#f7768e)'
