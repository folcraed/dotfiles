format = """
[вЦСвЦТвЦУ](#abb2bf)\
[ пМГ ](bg:#abb2bf fg:#090c0c)\
[оВі](bg:#51afef fg:#abb2bf)\
$directory\
[оВі](fg:#51afef bg:#5b6268)\
$git_branch\
$git_status\
[оВі](fg:#5b6268 bg:#3f444a)\
$nodejs\
$python\
$golang\
$lua\
[оВі](fg:#3f444a bg:#23272e)\
$cmd_duration\
[оВі ](fg:#23272e)\
\n$character"""

[directory]
style = "fg:#15161e bg:#51afef"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вА¶/"

[git_branch]
symbol = "пРШ"
style = "bg:#5b6268"
format = '[[ $symbol $branch ](fg:#e5c07b bg:#5b6268)]($style)'

[git_status]
style = "bg:#5b6268"
ahead = '[ пЕИ($count)](fg:green bg:#5b6268)'
untracked = '[ пД®($count)](fg:red bg:#5b6268)'
modified = '[ пБД ($count)](fg:yellow bg:#5b6268)'
deleted = '[ пАН ($count)](fg:red bg:#5b6268)'
format = '[[$all_status$ahead_behind](bg:#5b6268)]($style)'

[nodejs]
symbol = "оШМ "
style = "bg:#3f444a"
format = '[[ $symbol ($version) ](fg:#98be65 bg:#3f444a)]($style)'

[python]
symbol = "пПҐ "
style = "bg:#3f444a"
format = '[[ $symbol ($version) ](fg:#98be65 bg:#3f444a)]($style)'

[golang]
symbol = "оРП  "
style = "bg:#3f444a"
format = '[[ $symbol ($version) ](fg:#98be65 bg:#3f444a)]($style)'

[lua]
symbol = "оШ† "
style = "bg:#3f444a"
format = '[[ $symbol ($version) ](fg:#98be65 bg:#3f444a)]($style)'

[cmd_duration]
disabled = false
style = "bg:#23272e"
format = '[[ пРЇ $duration ](fg:#c678dd bg:#23272e)]($style)'

[character]
disabled = false
success_symbol = '[вЃЮ ](bold fg:#98c379)'
error_symbol = '[вЃЮ ](bold fg:#e06c75)'
